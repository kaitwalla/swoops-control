# Grafana datasource configuration
# This file is automatically provisioned when Grafana starts
#
# Place in: /etc/grafana/provisioning/datasources/
# Or mount in Docker: ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

apiVersion: 1

datasources:
  # Prometheus datasource for Swoops metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s
    version: 1

  # Optional: Add additional datasources here
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
  #   isDefault: false
  #   editable: false
