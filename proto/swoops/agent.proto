syntax = "proto3";

package swoops;

option go_package = "github.com/swoopsh/swoops/pkg/agentrpc";

service AgentService {
  rpc Connect(stream AgentEnvelope) returns (stream ControlEnvelope);
}

message AgentEnvelope {
  oneof payload {
    AgentHello hello = 1;
    Heartbeat heartbeat = 2;
    SessionOutput output = 3;
    CommandResult command_result = 4;
  }
}

message AgentHello {
  string host_id = 1;
  string host_name = 2;
  string agent_version = 3;
  string os = 4;
  string arch = 5;
  string auth_token = 6;  // Authentication token for agent
}

message Heartbeat {
  int64 sent_unix = 1;
  int32 running_sessions = 2;
}

message SessionOutput {
  string session_id = 1;
  string content = 2;
  bool eof = 3;
}

message ControlEnvelope {
  oneof payload {
    Ack ack = 1;
    SessionCommand command = 2;
  }
}

message Ack {
  string message = 1;
}

message SessionCommand {
  string command_id = 1;
  string session_id = 2;
  string command = 3;
  map<string, string> args = 4;
}

message CommandResult {
  string command_id = 1;
  string session_id = 2;
  bool ok = 3;
  string message = 4;
}
