# Docker Compose with Caddy for automatic HTTPS
#
# This is the recommended production deployment with:
# - Automatic Let's Encrypt certificates
# - Automatic certificate renewal
# - No manual certificate management needed
#
# Setup:
#   1. Set your domain in Caddyfile
#   2. Ensure DNS points to this server (required for Let's Encrypt)
#   3. Set environment variables:
#      export SWOOPS_API_KEY=$(openssl rand -hex 32)
#   4. Start: docker-compose -f docker-compose.caddy.yml up -d
#
# First startup: Caddy will automatically obtain Let's Encrypt certificate
# Renewals: Automatic (no action required)

version: '3.8'

services:
  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP (redirects to HTTPS)
      - "443:443"    # HTTPS
      - "443:443/udp"  # HTTP/3 support
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # Certificate storage (persistent!)
      - caddy-config:/config
    networks:
      - swoops-net
    depends_on:
      swoopsd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Swoops control plane
  swoopsd:
    image: swoops/control-plane:latest
    restart: unless-stopped
    expose:
      - "8080"  # HTTP API (internal only, accessed via Caddy)
    ports:
      - "9090:9090"  # gRPC (must be publicly accessible for agents)
    environment:
      # API Key (set via environment variable)
      - SWOOPS_API_KEY=${SWOOPS_API_KEY:?SWOOPS_API_KEY must be set}

      # HTTP server (no TLS - Caddy handles it)
      - SWOOPS_TLS_ENABLED=false
      - SWOOPS_EXTERNAL_URL=https://swoops.example.com

      # gRPC server (with mTLS for agents)
      - SWOOPS_GRPC_INSECURE=false
      - SWOOPS_GRPC_TLS_CERT=/certs/grpc-server-cert.pem
      - SWOOPS_GRPC_TLS_KEY=/certs/grpc-server-key.pem
      - SWOOPS_GRPC_CLIENT_CA=/certs/client-ca.pem
      - SWOOPS_GRPC_REQUIRE_MTLS=true

      # Database
      - SWOOPS_DB_PATH=/var/lib/swoops/swoops.db
    volumes:
      - swoops-data:/var/lib/swoops
      - ./certs:/certs:ro  # gRPC certificates for mTLS
    networks:
      - swoops-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"  # Prometheus UI (optional: expose via Caddy instead)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - swoops-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.swoops.example.com
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"  # Grafana UI (optional: expose via Caddy subdomain)
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - swoops-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  # IMPORTANT: caddy-data must be persistent for certificates!
  caddy-data:
    driver: local
  caddy-config:
  swoops-data:
  prometheus-data:
  grafana-data:

networks:
  swoops-net:
    driver: bridge

# Quick Start:
#
# 1. Generate certificates for gRPC mTLS:
#    ./scripts/generate-certs.sh
#
# 2. Create Caddyfile with your domain:
#    cat > Caddyfile <<EOF
#    swoops.example.com {
#        reverse_proxy swoopsd:8080
#    }
#    EOF
#
# 3. Set API key:
#    export SWOOPS_API_KEY=$(openssl rand -hex 32)
#
# 4. Start everything:
#    docker-compose -f docker-compose.caddy.yml up -d
#
# 5. Check logs:
#    docker-compose -f docker-compose.caddy.yml logs -f
#
# 6. Access UI:
#    https://swoops.example.com
#
# Certificate renewal is completely automatic!
